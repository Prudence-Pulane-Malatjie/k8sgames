apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgames
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8sgames
  template:
    metadata:
      labels:
        app: k8sgames
    spec:
      initContainers:
        - name: clone-game-repo
          # Alpine image bundled with git to pull down the repository
          image: alpine/git:2.43.0
          # Clones into a temporary folder first, then moves files to ensure /data is clean
          command:
            - "sh"
            - "-c"
            - "git clone https://github.com/Prudence-Pulane-Malatjie/k8sgames.git /tmp/repo && cp -r /tmp/repo/k8sgames-deployments* /data/"
          volumeMounts:
            - name: site-content
              mountPath: /data
      containers:
        - name: nginx
          image: nginx:1.27.0
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: site-content
          emptyDir: {}

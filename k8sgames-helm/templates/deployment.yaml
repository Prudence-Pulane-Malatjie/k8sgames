apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgames
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8sgames
  template:
    metadata:
      labels:
        app: k8sgames
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.0
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: site-content
          emptyDir: {}
